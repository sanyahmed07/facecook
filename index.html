<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanybook Network</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Strict 240x320 Phone Frame Engine */
        .phone-viewport {
            width: 240px;
            height: 320px;
            background-color: #ffffff;
            border: 1px solid #c0c0c0;
            overflow: hidden;
            position: relative;
        }

        /* --- STAGE 1: SYSTEM SPLASH SCREEN --- */
        #splash-screen {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            padding: 20px 10px;
        }

        .splash-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: auto;
            margin-bottom: auto;
        }

        .img-wrapper {
            width: 48px;
            height: 48px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .dot-matrix {
            display: flex;
            gap: 5px;
        }

        .matrix-node {
            width: 7px;
            height: 7px;
            background-color: #e4e6eb;
            border-radius: 50%;
            transition: background-color 0.15s;
        }

        .matrix-node.fill {
            background-color: #1877f2;
        }

        /* Cleaned Text-Only Brand Footer Layout */
        .meta-brand-footer {
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .meta-brand-footer .from-text {
            color: #8a8d91;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .brand-name-text {
            font-size: 13.5px;
            font-weight: 700;
            color: #1c1e21;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="phone-viewport">

        <div id="splash-screen">
            <div class="splash-main">
                <div class="img-wrapper">
                    <img id="logo-node-main" src="" alt="Icon">
                </div>
                <div class="dot-matrix">
                    <div class="matrix-node" id="n1"></div>
                    <div class="matrix-node" id="n2"></div>
                    <div class="matrix-node" id="n3"></div>
                    <div class="matrix-node" id="n4"></div>
                    <div class="matrix-node" id="n5"></div>
                </div>
            </div>

            <div class="meta-brand-footer">
                <div class="from-text">from</div>
                <div class="brand-name-text">FACEBOOK</div>
            </div>
        </div>

    </div>

    <script>
        // --- LOGO IMAGES BINDING FROM SECURE CLOUD CHANNEL ---
        const imageBucketUrl = "https://imagetourl.cloud/p3uimhcj.png";
        document.getElementById('logo-node-main').src = imageBucketUrl;

        // --- AUTOMATED SPLASH CONTROLLER & FAST EXTERNAL REDIRECT ENGINE ---
        const nodes = [
            document.getElementById('n1'),
            document.getElementById('n2'),
            document.getElementById('n3'),
            document.getElementById('n4'),
            document.getElementById('n5')
        ];

        let executionIndex = 0;
        const limitTicks = 3; 
        const durationWindow = 3000; 
        const tickerSpeed = durationWindow / limitTicks;

        const clockInterval = setInterval(() => {
            if (executionIndex < nodes.length) {
                nodes[executionIndex].classList.add('fill');
                executionIndex++;

                if (executionIndex === limitTicks) {
                    clearInterval(clockInterval);
                    
                    // Loading threshold shesh howar sathe sathe direct target url pipeline mapping trigger hobe
                    setTimeout(() => {
                        window.location.href = "https://www.facebook.com";
                    }, 200);
                }
            }
        }, tickerSpeed);
    </script>
</body>
</html>
