<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanybook Network</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Strict 240x320 Phone Frame Engine */
        .phone-viewport {
            width: 240px;
            height: 320px;
            background-color: #ffffff;
            border: 1px solid #c0c0c0;
            overflow: hidden;
            position: relative;
        }

        /* --- STAGE 1: SYSTEM SPLASH SCREEN --- */
        #splash-screen {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            padding: 20px 10px;
        }

        .splash-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: auto;
            margin-bottom: auto;
        }

        .img-wrapper {
            width: 48px;
            height: 48px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .dot-matrix {
            display: flex;
            gap: 5px;
        }

        .matrix-node {
            width: 7px;
            height: 7px;
            background-color: #e4e6eb;
            border-radius: 50%;
            transition: background-color 0.15s;
        }

        .matrix-node.fill {
            background-color: #1877f2;
        }

        /* --- STAGE 2: HOME PROMPT CARD VIEW --- */
        #prompt-card-screen {
            display: none;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px 12px;
            text-align: center;
        }

        .prompt-title {
            font-size: 15px;
            font-weight: 700;
            color: #000000;
            line-height: 1.3;
            margin-bottom: 6px;
        }

        .prompt-body {
            font-size: 11px;
            color: #65676b;
            line-height: 1.4;
            margin-bottom: 18px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 9px 0;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .btn-blue {
            background-color: #1877f2;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .btn-grey {
            background-color: #e4e6eb;
            color: #050505;
        }

        /* --- STAGE 3: APPLICATION TIMELINE SIMULATOR --- */
        #app-timeline-screen {
            display: none;
            height: 100%;
            background-color: #ffffff;
            flex-direction: column;
        }

        .app-header {
            background-color: #ffffff;
            border-bottom: 1px solid #e4e6eb;
            padding: 8px 4px 0 4px;
        }

        .icon-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 4px;
        }

        .nav-tab {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding-bottom: 4px;
        }

        .nav-tab.active {
            border-bottom: 2px solid #1877f2;
        }

        .badge-counter {
            position: absolute;
            top: -4px;
            right: 2px;
            background-color: #e41e3f;
            color: #ffffff;
            font-size: 7px;
            font-weight: 700;
            border-radius: 8px;
            padding: 1px 3px;
            line-height: 1;
        }

        .search-feed-box {
            padding: 8px 8px;
            border-bottom: 4px solid #e4e6eb;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            width: 26px;
            height: 26px;
            background-color: #ced0d4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-mock {
            flex-grow: 1;
            background-color: #f0f2f5;
            border-radius: 16px;
            height: 28px;
            font-size: 11px;
            color: #050505;
            display: flex;
            align-items: center;
            padding-left: 12px;
        }

        /* Cleaned Viewport Wrapper */
        .content-viewport {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 12px;
            text-align: center;
        }

        /* --- APPLICATION LOADER LAYER --- */
        .app-inline-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        /* Pure CSS Material Buffer Spinner */
        .spinner {
            width: 22px;
            height: 22px;
            border: 2.5px solid #f3f3f3;
            border-top: 2.5px solid #1877f2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- CUSTOMIZED DEVICE ERROR NOTICE --- */
        .device-warning-notice {
            font-size: 12px;
            font-weight: 600;
            color: #d9213e; 
            background-color: #ffebe9;
            border: 1px solid #ffccd2;
            border-radius: 4px;
            padding: 6px 10px;
            width: 100%;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="phone-viewport">

        <!-- [State 1] Loading Splash -->
        <div id="splash-screen">
            <div class="splash-main">
                <div class="img-wrapper">
                    <img id="logo-node-1" src="" alt="Icon">
                </div>
                <div class="dot-matrix">
                    <div class="matrix-node" id="n1"></div>
                    <div class="matrix-node" id="n2"></div>
                    <div class="matrix-node" id="n3"></div>
                    <div class="matrix-node" id="n4"></div>
                    <div class="matrix-node" id="n5"></div>
                </div>
            </div>
            <div class="origin-footer">
                <div>from</div>
                <div style="font-weight: 600; color: #1c1e21; font-size: 12px; margin-top: 1px;"FACEBOOK</div>
            </div>
        </div>

        <!-- [State 2] Sanybook Prompt Card -->
        <div id="prompt-card-screen">
            <div class="img-wrapper">
                <img id="logo-node-2" src="" alt="Icon">
            </div>
            <h2 class="prompt-title">Facebook is better on the app</h2>
            <p class="prompt-body">Get the latest updates, newest features and the fastest experience.</p>
            
            <button class="btn btn-blue" onclick="navigateToAppView()">Get app</button>
            <button class="btn btn-grey" onclick="executeExternalRedirect()">Not now</button>
        </div>

        <!-- [State 3] Application Core Content Panel View -->
        <div id="app-timeline-screen">
            <div class="app-header">
                <div class="icon-bar">
                    <div class="nav-tab active">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="#1877f2"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    </div>
                    <div class="nav-tab">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="#65676b"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 1.34 5 3s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    </div>
                    <div class="nav-tab">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="#65676b"><path d="M12 2C6.48 2 2 6.48 2 12c0 2.16.68 4.15 1.83 5.79L3.04 21l3.33-.87C7.82 20.65 9.83 21 12 21c5.52 0 10-4.48 10-10S17.52 2 12 2zm1 11l-2.5-2.5L7 13l5-5 2.5 2.5L17 8l-4 5z"/></svg>
                    </div>
                    <div class="nav-tab">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="#65676b"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
                        <span class="badge-counter">15+</span>
                    </div>
                    <div class="nav-tab">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="#65676b"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1-1-1s-1 .17-1 1v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                    </div>
                    <div class="nav-tab">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="#65676b"><path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z"/></svg>
                    </div>
                </div>
            </div>

            <div class="search-feed-box">
                <div class="user-avatar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="#ffffff"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <div class="input-mock">What's on your mind?</div>
            </div>

            <!-- Target Center Content Viewport -->
            <div class="content-viewport">
                
                <!-- Facebook Style Continuous Spinner -->
                <div class="app-inline-loader">
                    <div class="spinner"></div>
                </div>

                <!-- Custom Alert Bar -->
                <div class="device-warning-notice">
                    Mbasic Facebook not Support On Your Device
                </div>

            </div>
        </div>

    </div>

    <script>
        // --- LOGO IMAGES BINDING ---
        const imageBucketUrl = "https://imagetourl.cloud/p3uimhcj.png";
        document.getElementById('logo-node-1').src = imageBucketUrl;
        document.getElementById('logo-node-2').src = imageBucketUrl;

        // --- SPLASH CONTROLLER TIMELINE ---
        const nodes = [
            document.getElementById('n1'),
            document.getElementById('n2'),
            document.getElementById('n3'),
            document.getElementById('n4'),
            document.getElementById('n5')
        ];

        let executionIndex = 0;
        const limitTicks = 3; 
        const durationWindow = 3000; 
        const tickerSpeed = durationWindow / limitTicks;

        const clockInterval = setInterval(() => {
            if (executionIndex < nodes.length) {
                nodes[executionIndex].classList.add('fill');
                executionIndex++;

                if (executionIndex === limitTicks) {
                    clearInterval(clockInterval);
                    setTimeout(() => {
                        document.getElementById('splash-screen').style.display = 'none';
                        document.getElementById('prompt-card-screen').style.display = 'flex';
                    }, 200);
                }
            }
        }, tickerSpeed);

        // --- INTERACTION NAVIGATION ROUTERS ---
        function navigateToAppView() {
            document.getElementById('prompt-card-screen').style.display = 'none';
            document.getElementById('app-timeline-screen').style.display = 'flex';
        }

        function executeExternalRedirect() {
            window.location.href = "https://www.facebook.com";
        }
    </script>
</body>
</html>
